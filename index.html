const formatTime = (s) => { if (s < 0) s = 0; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec.toString().padStart(2, "0")}`; };

// ─── MAIN APP ──────────────────────────────────────────────────────
function DarkroomApp() {
  const [screen, setScreen] = useState("home");
  const [selectedDev, setSelectedDev] = useState(null);
  const [selectedFilm, setSelectedFilm] = useState(null);
  const [selectedCombo, setSelectedCombo] = useState(null);
  const [volume, setVolume] = useState(1000);
  const [presoak, setPresoak] = useState(false);

  const navigate = (s, data) => {
    setScreen(s);
    if (data?.dev !== undefined) setSelectedDev(data.dev);
    if (data?.film !== undefined) setSelectedFilm(data.film);
    if (data?.combo !== undefined) setSelectedCombo(data.combo);
    if (data?.presoak !== undefined) setPresoak(data.presoak);
  };

  return (
    <div style={S.app}>
      <style>{`
        @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.3)} 50%{box-shadow:0 0 20px 4px rgba(255,107,53,0.15)} }
        @keyframes checkPop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        @keyframes tankRock { 0%{transform:rotate(-12deg)} 100%{transform:rotate(12deg)} }
        * { box-sizing: border-box; }
      `}</style>
      <div style={S.safeArea}>
        {screen === "home" && <HomeScreen navigate={navigate} />}
        {screen === "mixing" && <MixingScreen dev={selectedDev} volume={volume} setVolume={setVolume} navigate={navigate} />}
        {screen === "filmSelect" && <FilmSelectScreen dev={selectedDev} navigate={navigate} />}
        {screen === "timer" && <TimerScreen combo={selectedCombo} film={selectedFilm} dev={selectedDev} presoak={presoak} setPresoak={setPresoak} navigate={navigate} />}
        {screen === "process" && <ProcessScreen combo={selectedCombo} film={selectedFilm} dev={selectedDev} presoak={presoak} navigate={navigate} />}
      </div>
    </div>
  );
}

// ─── MIXING (CHECKLIST) ────────────────────────────────────────────
function MixingScreen({ dev, volume, setVolume, navigate }) {
  const [completed, setCompleted] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const d = DEVELOPERS[dev];
  const scale = volume / 1000;
  const total = d.mixingSteps.length;
  const doneCount = Object.keys(completed).length;

  const toggleStep = (idx) => {
    setCompleted(prev => {
      const next = { ...prev };
      if (next[idx]) { delete next[idx]; }
      else {
        next[idx] = true;
        for (let i = idx + 1; i < total; i++) { if (!next[i]) { setActiveStep(i); break; } }
      }

// ─── BUILD SCHEDULE HELPER ─────────────────────────────────────────
function buildAgitationSchedule(duration, agitationKey) {
  const pat = AGITATION_PATTERNS[agitationKey];
  if (!pat || !duration) return [];
  const schedule = [];

  if (pat.name === "連続攪拌") {
    schedule.push({ start: 0, end: duration, type: "agitate", label: "連続攪拌" });
    return schedule;
  }
  if (pat.name === "最初5秒のみ") {
    schedule.push({ start: 0, end: Math.min(5, duration), type: "agitate", label: "穏やかに攪拌" });
    if (duration > 5) schedule.push({ start: 5, end: duration, type: "rest", label: "静置" });
    return schedule;
  }

  // Initial continuous
  schedule.push({ start: 0, end: Math.min(pat.initial, duration), type: "agitate", label: "連続攪拌" });
  let t = pat.initial;
  let cycleNum = 1;
  while (t < duration) {
    const restEnd = Math.min(t + pat.interval - pat.duration, duration);
    if (t < duration) {
      schedule.push({ start: t, end: restEnd, type: "rest", label: "静置" });
    }
    if (restEnd < duration) {
      const agEnd = Math.min(restEnd + pat.duration, duration);
      schedule.push({ start: restEnd, end: agEnd, type: "agitate", label: `攪拌 #${cycleNum}` });
      cycleNum++;
      t = restEnd + pat.duration + (pat.interval - pat.duration);
      // Actually let's simplify - t advances by interval
    } else break;
    // Recalculate: from initial, every `interval` seconds we agitate for `duration` seconds
  }
  return schedule;
}

// More accurate schedule builder
function buildSchedule(totalDuration, agitationKey) {
  const pat = AGITATION_PATTERNS[agitationKey];
  if (!pat || !totalDuration) return [];
  const items = [];

  if (pat.name === "連続攪拌") {
    items.push({ start: 0, end: totalDuration, type: "agitate" });
    return items;
  }
  if (pat.name === "最初5秒のみ") {
    items.push({ start: 0, end: Math.min(5, totalDuration), type: "agitate" });
    if (totalDuration > 5) items.push({ start: 5, end: totalDuration, type: "rest" });
    return items;
  }

  // Initial agitation
  const initEnd = Math.min(pat.initial, totalDuration);
  items.push({ start: 0, end: initEnd, type: "agitate" });

  let t = pat.initial;
  while (t < totalDuration) {
    // Rest period
    const restEnd = Math.min(t + (pat.interval - pat.duration), totalDuration);
    if (t < restEnd) {
      items.push({ start: t, end: restEnd, type: "rest" });
    }
    // Agitation period
    if (restEnd < totalDuration) {
      const agEnd = Math.min(restEnd + pat.duration, totalDuration);
      items.push({ start: restEnd, end: agEnd, type: "agitate" });
    }
    t += pat.interval;
  }
  return items;
}

// ─── FULL PROCESS SCHEDULE (all steps) ─────────────────────────────
function buildFullSchedule(steps) {
  const schedule = [];
  let offset = 0;
  for (const step of steps) {
    const agItems = step.agitation ? buildSchedule(step.duration, step.agitation) : [{ start: 0, end: step.duration, type: "agitate" }];
    schedule.push({
      stepName: step.name,
      stepNameShort: step.nameShort,
      duration: step.duration,
      offset,
      agitation: agItems,
    });
    offset += step.duration;
  }
  return schedule;
}

// ─── AGITATION TIMELINE COMPONENT ──────────────────────────────────
function AgitationTimeline({ duration, agitationKey, elapsedInStep }) {
  const pat = AGITATION_PATTERNS[agitationKey];
  if (!pat || !duration) return null;

  // Build segments: [{start, end, type: "agitate"|"rest"}]
  const segments = [];
  if (pat.name === "連続攪拌") {
    segments.push({ start: 0, end: duration, type: "agitate" });
  } else if (pat.name === "最初5秒のみ") {
    segments.push({ start: 0, end: Math.min(5, duration), type: "agitate" });
    if (duration > 5) segments.push({ start: 5, end: duration, type: "rest" });
  } else {
    // Initial continuous
    segments.push({ start: 0, end: Math.min(pat.initial, duration), type: "agitate" });
    let t = pat.initial;
    while (t < duration) {
      const agEnd = Math.min(t + pat.duration, duration);
      segments.push({ start: t, end: agEnd, type: "agitate" });
      if (agEnd < duration) {
        const restEnd = Math.min(t + pat.interval, duration);
        segments.push({ start: agEnd, end: restEnd, type: "rest" });
        t += pat.interval;
      } else break;
    }
  }

  const pct = (v) => `${(v / duration) * 100}%`;
  const curPct = Math.min((elapsedInStep / duration) * 100, 100);

  return (
    <div style={{ margin: "0 0 6px", padding: "0 2px" }}>
      {/* Time labels */}
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#6a5a46", marginBottom: 4, fontVariantNumeric: "tabular-nums" }}>
        <span>0:00</span>
        <span>{formatTime(Math.floor(duration / 2))}</span>
        <span>{formatTime(duration)}</span>
      </div>
      {/* Bar */}
      <div style={{ position: "relative", height: 28, background: "rgba(255,255,255,0.04)", borderRadius: 6, overflow: "hidden" }}>
        {segments.map((seg, i) => (
          <div key={i} style={{
            position: "absolute", top: 0, bottom: 0,
            left: pct(seg.start), width: pct(seg.end - seg.start),
            background: seg.type === "agitate" ? "rgba(255,107,53,0.35)" : "rgba(255,255,255,0.03)",
            borderRight: "1px solid rgba(0,0,0,0.3)",
          }} />
        ))}
        {/* Current position marker */}
        <div style={{
          position: "absolute", top: 0, bottom: 0, width: 3,
          left: `calc(${curPct}% - 1.5px)`,
          background: "#f0e6d4", borderRadius: 2,
          boxShadow: "0 0 6px rgba(240,230,212,0.5)",
          transition: "left 1s linear",
        }} />
      </div>
      {/* Legend */}
      <div style={{ display: "flex", gap: 16, marginTop: 6, fontSize: 10, color: "#8a7a66" }}>
        <span><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 2, background: "rgba(255,107,53,0.5)", marginRight: 4, verticalAlign: "middle" }}/>攪拌</span>
        <span><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 2, background: "rgba(255,255,255,0.08)", marginRight: 4, verticalAlign: "middle" }}/>静置</span>
      </div>
    </div>
  );
}

// ─── AUDIO ENGINE (iOS Safari対応) ──────────────────────────────────
// AudioContext for reliable beep sounds (works even when speech fails)
let audioCtx = null;
let audioUnlocked = false;

const initAudio = () => {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { /* not available */ }
};

const unlockAudio = () => {
  initAudio();
  if (!audioCtx || audioUnlocked) return;
  // iOS requires resume() within a user gesture
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  // Play a silent buffer to fully unlock
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  audioUnlocked = true;
  // Also try to unlock speech
  try {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance("。");
      u.lang = "ja-JP"; u.volume = 0.01;
      window.speechSynthesis.speak(u);
    }
  } catch (e) {}
};

// Beep sound: freq in Hz, duration in ms
const beep = (freq = 880, duration = 150, volume = 0.3) => {
  if (!audioCtx) initAudio();
  if (!audioCtx) return;
  try {
    if (audioCtx.state === "suspended") audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration / 1000);
  } catch (e) {}
};

// Double beep for agitation start
const beepAgitate = () => {
  beep(880, 150, 0.4);
  setTimeout(() => beep(1100, 150, 0.4), 200);
};

// Single low beep for rest
const beepRest = () => beep(440, 200, 0.2);

// Triple beep for step complete
const beepComplete = () => {
  beep(660, 150, 0.4);
  setTimeout(() => beep(880, 150, 0.4), 200);
  setTimeout(() => beep(1100, 200, 0.4), 400);
};

// Countdown tick
const beepTick = () => beep(660, 80, 0.15);

// Speech synthesis (may or may not work on iOS)
const speak = (text, lang = "ja-JP") => {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.95;   // ゆっくりめで滑らか
    u.pitch = 1.15;  // やや高めで女性的に
    u.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    // iOS日本語女性ボイス優先順: O-Ren (enhanced) > Kyoko > any ja female
    const preferred = ["O-Ren", "Kyoko", "Haruka", "Sayaka"];
    let chosen = null;
    for (const name of preferred) {
      chosen = voices.find(v => v.lang.startsWith("ja") && v.name.includes(name));
      if (chosen) break;
    }
    // Fallback: any Japanese voice that's NOT male (Otoya)
    if (!chosen) {
      chosen = voices.find(v => v.lang.startsWith("ja") && !v.name.includes("Otoya") && !v.name.includes("Hattori"));
    }
    // Final fallback: any Japanese voice
    if (!chosen) {
      chosen = voices.find(v => v.lang.startsWith("ja"));
    }
    if (chosen) u.voice = chosen;
    window.speechSynthesis.speak(u);
  } catch (e) { /* speech not available */ }
};

// Combined: beep (always) + speech (if enabled and available)
const announce = (text, soundType = "agitate") => {
  if (soundType === "agitate") beepAgitate();
  else if (soundType === "rest") beepRest();
  else if (soundType === "complete") beepComplete();
  else if (soundType === "tick") beepTick();
  speak(text);
};

// ─── TANK SVG ANIMATION ────────────────────────────────────────────
function TankAnimation({ isAgitating, isRunning }) {
  const active = isAgitating && isRunning;
  return (
    <div style={{ width: 120, height: 100, margin: "0 auto 8px", position: "relative" }}>
      <svg viewBox="0 0 120 100" style={{
        width: "100%", height: "100%",
        transform: active ? undefined : "rotate(0deg)",
        animation: active ? "tankRock 0.4s ease-in-out infinite alternate" : "none",
        transition: "transform 0.3s ease",
      }}>
        {/* Tank body */}
        <rect x="30" y="15" width="60" height="70" rx="4" fill="none"
          stroke={active ? "#ff6b35" : "#5a4a36"} strokeWidth="2.5"
          style={{ transition: "stroke 0.3s" }} />
        {/* Lid */}
        <rect x="26" y="10" width="68" height="10" rx="3" fill="none"
          stroke={active ? "#ff6b35" : "#5a4a36"} strokeWidth="2"
          style={{ transition: "stroke 0.3s" }} />
        {/* Center rod */}
        <line x1="60" y1="5" x2="60" y2="12" stroke={active ? "#ff6b35" : "#5a4a36"} strokeWidth="2.5" strokeLinecap="round" />
        {/* Liquid level */}
        <rect x="33" y="35" width="54" height="47" rx="2"
          fill={active ? "rgba(255,107,53,0.15)" : "rgba(200,168,124,0.08)"}
          style={{ transition: "fill 0.3s" }} />
        {/* Liquid surface wave */}
        <path d={active
          ? "M33 35 Q42 30 51 35 Q60 40 69 35 Q78 30 87 35"
          : "M33 35 L87 35"}
          fill="none" stroke={active ? "rgba(255,107,53,0.5)" : "rgba(200,168,124,0.2)"}
          strokeWidth="1.5"
          style={{ transition: "all 0.3s" }} />
        {/* Arrows showing motion */}
        {active && <>
          <path d="M15 40 L10 50 L15 60" fill="none" stroke="rgba(255,107,53,0.4)" strokeWidth="1.5" strokeLinecap="round" />
          <path d="M105 40 L110 50 L105 60" fill="none" stroke="rgba(255,107,53,0.4)" strokeWidth="1.5" strokeLinecap="round" />
        </>}
      </svg>
      {/* Status text under tank */}
      <div style={{
        textAlign: "center", fontSize: 11, fontWeight: 600, letterSpacing: 1,
        color: active ? "#ff6b35" : "#5a4a36",
        transition: "color 0.3s",
      }}>
        {active ? "転倒攪拌中" : isRunning ? "静置中" : "待機中"}
      </div>
    </div>
  );
}

// ─── PROCESS TIMER ─────────────────────────────────────────────────
function ProcessScreen({ combo, film, dev, presoak, navigate }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [totalElapsed, setTotalElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [alert, setAlert] = useState("");
  const [done, setDone] = useState(false);
  const [voiceOn, setVoiceOn] = useState(true);
  const [countdown, setCountdown] = useState(null); // null or number 5,4,3,2,1
  const ref = useRef(null);
  const lastSpokenRef = useRef(""); // prevent repeating same announcement

  const steps = PROCESS_STEPS
    .filter(s => !s.optional || (s.id === "presoak" && presoak))
    .map(s => s.id === "developer" ? { ...s, duration: combo.time, agitation: combo.agitation } : s);
  const totalTime = steps.reduce((a, s) => a + s.duration, 0);
  const elapsedBefore = steps.slice(0, stepIdx).reduce((a, s) => a + s.duration, 0);
  const cur = steps[stepIdx];
  const pat = cur ? AGITATION_PATTERNS[cur.agitation] : null;
  const elapsedInStep = cur ? cur.duration - timeLeft : 0;
  const globalElapsed = elapsedBefore + elapsedInStep;
  const globalRemaining = totalTime - globalElapsed;

  const goStep = useCallback((i) => {
    if (i >= steps.length) { setDone(true); setRunning(false); return; }
    setStepIdx(i); setTimeLeft(steps[i].duration); setAlert(""); setCountdown(null);
    lastSpokenRef.current = "";
  }, [steps]);

  useEffect(() => { goStep(0); }, []);

  // Init audio + load voices
  useEffect(() => {
    initAudio();
    try {
      window.speechSynthesis?.getVoices();
      if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    } catch(e){}
  }, []);

  useEffect(() => {
    if (running && timeLeft > 0) {
      ref.current = setInterval(() => {
        setTimeLeft(p => {
          if (p <= 1) {
            setRunning(false);
            setAlert("⏰ 工程完了！次へ進んでください");
            setCountdown(null);
            beepComplete();
            try { navigator.vibrate?.([200,100,200,100,200]); } catch(e){}
            return 0;
          }
          return p - 1;
        });
        setTotalElapsed(p => p + 1);
      }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [running, timeLeft]);

  // ── Agitation state + voice + countdown logic ──
  useEffect(() => {
    if (!running || !cur || !pat) return;
    const e = cur.duration - timeLeft;

    let newAlert = "";
    let newCountdown = null;

    // Determine agitation state
    if (pat.name === "連続攪拌") {
      newAlert = "🔄 連続攪拌中";
    } else if (pat.name === "最初5秒のみ") {
      newAlert = e < 5 ? "🔄 穏やかに攪拌" : "⏸ 静置";
    } else {
      // Complex pattern with initial + interval cycles
      if (e < pat.initial) {
        newAlert = "🔄 攪拌してください";
      } else {
        const sinceInitial = e - pat.initial;
        const inCycle = sinceInitial % pat.interval;
        if (inCycle < pat.duration) {
          newAlert = "🔄 攪拌してください";
        } else {
          newAlert = "⏸ 静置";
          // Check if countdown to next agitation
          const timeToNext = pat.interval - inCycle;
          if (timeToNext <= 5 && timeToNext > 0) {
            newCountdown = timeToNext;
          }
        }
      }
    }

    // Sound + voice logic: on state transitions
    const isNowAgitating = newAlert.includes("攪拌");
    const wasAgitating = alert.includes("攪拌");
    let soundType = null;
    let speechText = "";

    if (isNowAgitating && !wasAgitating) {
      soundType = "agitate";
      speechText = "攪拌してください";
      try { navigator.vibrate?.(100); } catch(e){}
    } else if (!isNowAgitating && wasAgitating && !newAlert.includes("完了")) {
      soundType = "rest";
      speechText = "静置";
    }

    // Countdown
    if (newCountdown !== null && newCountdown !== countdown) {
      if (newCountdown === 5) { soundType = "tick"; speechText = "5秒後に攪拌"; }
      else if (newCountdown <= 3) { soundType = "tick"; speechText = `${newCountdown}`; }
    }

    // Step completion
    if (newAlert.includes("完了") && lastSpokenRef.current !== "complete") {
      soundType = "complete";
      speechText = "工程完了。次へ進んでください";
      lastSpokenRef.current = "complete";
    }

    setAlert(newAlert);
    setCountdown(newCountdown);

    // Beeps always play; speech only when voiceOn
    if (soundType && speechText !== lastSpokenRef.current) {
      if (soundType === "agitate") beepAgitate();
      else if (soundType === "rest") beepRest();
      else if (soundType === "complete") beepComplete();
      else if (soundType === "tick") beepTick();
      if (voiceOn) speak(speechText);
      if (!speechText.match(/^[0-9]$/)) lastSpokenRef.current = speechText;
    }
  }, [timeLeft, running, cur, pat, voiceOn]);

  // Voice + beep for step transitions
  useEffect(() => {
    if (running && cur) {
      beep(660, 200, 0.3);
      if (voiceOn) {
        const msg = cur.name + "を開始します";
        speak(msg);
      }
    }
  }, [stepIdx, running]);

  if (done) return (
    <div style={S.screen}>
      <div style={{ textAlign: "center", paddingTop: 80 }}>
        <div style={{ fontSize: 64, color: "#5a9a6a", marginBottom: 16 }}>✓</div>
        <h2 style={{ fontSize: 28, fontWeight: 700, color: "#f0e6d4", margin: "0 0 8px" }}>現像完了！</h2>
        <p style={{ fontSize: 14, color: "#8a7a66", marginBottom: 8 }}>フィルムを吊るして乾燥させてください</p>
        <p style={{ fontSize: 14, color: "#8a7a66", marginBottom: 24 }}>総処理時間: {formatTimeJa(totalElapsed)}</p>
        <button style={S.primaryBtn} onClick={() => navigate("home")}>ホームへ戻る</button>
      </div>
    </div>
  );

  const agitating = alert.includes("攪拌");
  const stepProgress = cur ? (elapsedInStep / cur.duration) * 100 : 0;

  return (
    <div style={{ ...S.screen, padding: "0 16px 40px", ...(agitating && running ? S.screenAgitate : {}) }}>
      {/* Header row: back + voice toggle */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button style={S.backBtn} onClick={() => { setRunning(false); try{window.speechSynthesis?.cancel();}catch(e){} navigate("timer", { combo, film, dev }); }}>← 中止</button>
        <button
          onClick={() => { unlockAudio(); if(!voiceOn) { speak("音声オン"); } setVoiceOn(v => !v); if(voiceOn) try{window.speechSynthesis?.cancel();}catch(e){} }}
          style={{
            background: voiceOn ? "rgba(200,168,124,0.15)" : "rgba(255,255,255,0.04)",
            border: `1px solid ${voiceOn ? "rgba(200,168,124,0.4)" : "rgba(255,255,255,0.1)"}`,
            borderRadius: 20, padding: "6px 14px", cursor: "pointer",
            fontFamily: "inherit", fontSize: 13, color: voiceOn ? "#c8a87c" : "#5a4a36",
            transition: "all 0.2s",
          }}
        >
          {voiceOn ? "🔊 音声ON" : "🔇 ビープのみ"}
        </button>
      </div>

      {/* ── GLOBAL OVERVIEW ── */}
      <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "12px 14px", border: "1px solid rgba(200,168,124,0.1)", marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div style={{ fontSize: 10, color: "#6a5a46", letterSpacing: 1 }}>経過</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#c8a87c", fontVariantNumeric: "tabular-nums" }}>{formatTime(globalElapsed)}</div>
          </div>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div style={{ fontSize: 10, color: "#6a5a46", letterSpacing: 1 }}>合計</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#8a7a66", fontVariantNumeric: "tabular-nums" }}>{formatTime(totalTime)}</div>
          </div>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div style={{ fontSize: 10, color: "#6a5a46", letterSpacing: 1 }}>残り</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#e0d4c2", fontVariantNumeric: "tabular-nums" }}>{formatTime(globalRemaining)}</div>
          </div>
        </div>
        <div style={{ position: "relative", height: 8, borderRadius: 4, overflow: "hidden", background: "rgba(255,255,255,0.04)" }}>
          {steps.reduce((acc, s, i) => {
            const prevTotal = acc.offset;
            acc.items.push(
              <div key={i} style={{
                position: "absolute", top: 0, bottom: 0,
                left: `${(prevTotal / totalTime) * 100}%`,
                width: `${(s.duration / totalTime) * 100}%`,
                borderRight: i < steps.length - 1 ? "1px solid rgba(0,0,0,0.5)" : "none",
                background: i < stepIdx ? "rgba(200,168,124,0.4)" :
                  i === stepIdx ? `linear-gradient(90deg, rgba(200,168,124,0.4) ${stepProgress}%, transparent ${stepProgress}%)` :
                  "transparent",
              }} />
            );
            acc.offset += s.duration;
            return acc;
          }, { items: [], offset: 0 }).items}
        </div>
        <div style={{ display: "flex", marginTop: 4 }}>
          {steps.map((s, i) => (
            <div key={i} style={{
              flex: s.duration, textAlign: "center", fontSize: 9,
              color: i === stepIdx ? "#c8a87c" : "#5a4a36",
              fontWeight: i === stepIdx ? 700 : 400,
              overflow: "hidden", whiteSpace: "nowrap",
            }}>{s.nameShort}</div>
          ))}
        </div>
      </div>

      {/* ── CURRENT STEP: COMPACT LAYOUT ── */}
      <div style={{ textAlign: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 12, color: "#8a7a66" }}>{stepIdx + 1} / {steps.length}</div>
        <div style={{ fontSize: 20, fontWeight: 700, color: "#f0e6d4" }}>{cur?.name}</div>
      </div>

      {/* Tank + Timer side by side */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
        {/* Tank animation (compact) */}
        <div style={{ width: 80, flexShrink: 0 }}>
          <svg viewBox="0 0 120 100" style={{
            width: "100%",
            animation: agitating && running ? "tankRock 0.4s ease-in-out infinite alternate" : "none",
          }}>
            <rect x="30" y="15" width="60" height="70" rx="4" fill="none"
              stroke={agitating && running ? "#ff6b35" : "#5a4a36"} strokeWidth="2.5" />
            <rect x="26" y="10" width="68" height="10" rx="3" fill="none"
              stroke={agitating && running ? "#ff6b35" : "#5a4a36"} strokeWidth="2" />
            <line x1="60" y1="5" x2="60" y2="12" stroke={agitating && running ? "#ff6b35" : "#5a4a36"} strokeWidth="2.5" strokeLinecap="round" />
            <rect x="33" y="35" width="54" height="47" rx="2"
              fill={agitating && running ? "rgba(255,107,53,0.15)" : "rgba(200,168,124,0.08)"} />
            <path d={agitating && running ? "M33 35 Q42 30 51 35 Q60 40 69 35 Q78 30 87 35" : "M33 35 L87 35"}
              fill="none" stroke={agitating && running ? "rgba(255,107,53,0.5)" : "rgba(200,168,124,0.2)"} strokeWidth="1.5" />
            {agitating && running && <>
              <path d="M15 40 L10 50 L15 60" fill="none" stroke="rgba(255,107,53,0.4)" strokeWidth="1.5" strokeLinecap="round" />
              <path d="M105 40 L110 50 L105 60" fill="none" stroke="rgba(255,107,53,0.4)" strokeWidth="1.5" strokeLinecap="round" />
            </>}
          </svg>
          <div style={{ textAlign: "center", fontSize: 10, fontWeight: 600, color: agitating && running ? "#ff6b35" : "#5a4a36" }}>
            {agitating && running ? "攪拌中" : running ? "静置中" : "待機"}
          </div>
        </div>

        {/* Timer circle (compact) */}
        <div style={{ position: "relative", width: 120, height: 120, flexShrink: 0 }}>
          <svg viewBox="0 0 200 200" style={{ width: "100%", height: "100%" }}>
            <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6" />
            <circle cx="100" cy="100" r="90" fill="none"
              stroke={agitating && running ? "#ff6b35" : "#c8a87c"} strokeWidth="6" strokeLinecap="round"
              strokeDasharray={`${2*Math.PI*90}`} strokeDashoffset={`${2*Math.PI*90*(1-stepProgress/100)}`}
              style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} transform="rotate(-90 100 100)" />
          </svg>
          <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
            fontSize: 28, fontWeight: 200, color: "#f0e6d4", fontVariantNumeric: "tabular-nums",
            fontFamily: "'SF Mono','Menlo',monospace" }}>{formatTime(timeLeft)}</div>
        </div>

        {/* Alert + countdown (compact) */}
        <div style={{ flex: 1, minWidth: 0 }}>
          {countdown !== null && running && !agitating && (
            <div style={{ fontSize: 13, color: "#d4a055", fontWeight: 600, marginBottom: 4 }}>
              ⏱ {countdown}秒後
            </div>
          )}
          <div style={{
            padding: "10px 12px", borderRadius: 10, fontSize: 14, fontWeight: 600, lineHeight: 1.4,
            background: agitating && running ? "rgba(255,107,53,0.12)" : "rgba(255,255,255,0.03)",
            color: agitating && running ? "#ff6b35" : "#8a7a66",
            border: `1px solid ${agitating && running ? "rgba(255,107,53,0.3)" : "rgba(200,168,124,0.08)"}`,
            animation: agitating && running ? "pulseGlow 1.5s infinite" : "none",
          }}>{alert || "▶ で開始"}</div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 12 }}>
        {!running && timeLeft > 0 && <button style={{ ...S.timerPlayBtn, padding: "12px 40px", fontSize: 16 }} onClick={() => { unlockAudio(); beep(880, 200, 0.3); if(voiceOn) speak("開始します"); setRunning(true); }}>▶ 開始</button>}
        {running && <button style={{ ...S.timerPauseBtn, padding: "12px 40px", fontSize: 16 }} onClick={() => setRunning(false)}>⏸ 一時停止</button>}
        {timeLeft === 0 && stepIdx < steps.length - 1 && (
          <button style={{ ...S.timerNextBtn, padding: "12px 24px", fontSize: 14 }} onClick={() => goStep(stepIdx + 1)}>次へ: {steps[stepIdx + 1]?.name} →</button>
        )}
        {timeLeft === 0 && stepIdx === steps.length - 1 && (
          <button style={{ ...S.timerNextBtn, padding: "12px 24px", fontSize: 14 }} onClick={() => setDone(true)}>完了 ✓</button>
        )}
      </div>

      {/* Agitation timeline bar */}
      {cur && cur.agitation && (
        <AgitationTimeline duration={cur.duration} agitationKey={cur.agitation} elapsedInStep={elapsedInStep} />
      )}

      {/* ── LIVE SCHEDULE LIST ── */}
      <div style={{ ...S.sectionLabel, marginTop: 12, marginBottom: 8 }}>攪拌スケジュール</div>
      <div style={{
        background: "rgba(255,255,255,0.02)", borderRadius: 10, overflow: "hidden",
        border: "1px solid rgba(200,168,124,0.08)", maxHeight: 240, overflowY: "auto",
        WebkitOverflowScrolling: "touch",
      }}>
        {cur && cur.agitation && (() => {
          const sched = buildSchedule(cur.duration, cur.agitation);
          return sched.map((item, i) => {
            const dur = item.end - item.start;
            const isAg = item.type === "agitate";
            const isCurrent = elapsedInStep >= item.start && elapsedInStep < item.end;
            const isDone = elapsedInStep >= item.end;
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "8px 12px",
                borderBottom: i < sched.length - 1 ? "1px solid rgba(200,168,124,0.04)" : "none",
                background: isCurrent
                  ? (isAg ? "rgba(255,107,53,0.1)" : "rgba(200,168,124,0.06)")
                  : "transparent",
                opacity: isDone ? 0.4 : 1,
                transition: "all 0.3s",
              }}>
                {/* Marker */}
                <div style={{
                  width: 6, height: 6, borderRadius: "50%", flexShrink: 0,
                  background: isCurrent ? (isAg ? "#ff6b35" : "#c8a87c") : (isAg ? "rgba(255,107,53,0.3)" : "rgba(200,168,124,0.15)"),
                  boxShadow: isCurrent ? `0 0 6px ${isAg ? "rgba(255,107,53,0.5)" : "rgba(200,168,124,0.3)"}` : "none",
                }} />
                {/* Time */}
                <div style={{ minWidth: 75, fontSize: 12, fontVariantNumeric: "tabular-nums", color: isCurrent ? "#e0d4c2" : "#7a6a56" }}>
                  {formatTime(item.start)}–{formatTime(item.end)}
                </div>
                {/* Action */}
                <div style={{
                  flex: 1, fontSize: 13,
                  color: isCurrent ? (isAg ? "#ff6b35" : "#c8a87c") : (isAg ? "#9a6a40" : "#5a4a36"),
                  fontWeight: isCurrent ? 700 : 400,
                }}>
                  {isAg ? "攪拌" : "静置"}
                  {isCurrent && " ◀"}
                </div>
                {/* Duration */}
                <div style={{ fontSize: 11, color: "#6a5a46", fontVariantNumeric: "tabular-nums" }}>
                  {dur >= 60 ? formatTimeJa(dur) : `${dur}秒`}
                </div>
              </div>
            );
          });
        })()}

        {/* If not a developer step, show simple info */}
        {cur && !cur.agitation && (
          <div style={{ padding: "12px", fontSize: 13, color: "#8a7a66", textAlign: "center" }}>
            {cur.description}
          </div>
        )}
      </div>

      {/* ── REMAINING PROCESS STEPS ── */}
      {stepIdx < steps.length - 1 && (
        <>
          <div style={{ ...S.sectionLabel, marginTop: 12, marginBottom: 6 }}>この後の工程</div>
          {steps.slice(stepIdx + 1).map((s, i) => (
            <div key={i} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "8px 12px", fontSize: 13,
              borderBottom: "1px solid rgba(200,168,124,0.04)",
            }}>
              <span style={{ color: "#7a6a56" }}>{s.name}</span>
              <span style={{ color: "#5a4a36", fontVariantNumeric: "tabular-nums" }}>{formatTimeJa(s.duration)}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ─── STYLES ────────────────────────────────────────────────────────

  heroSection: { textAlign:"center", padding:"40px 0 30px" },
  heroIcon: { fontSize:48, color:"#c8a87c", marginBottom:12 },
  heroTitle: { fontSize:28, fontWeight:700, color:"#f0e6d4", margin:0, letterSpacing:2 },

  devCard: { width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(200,168,124,0.15)", borderRadius:12, padding:"16px 18px", marginBottom:10, cursor:"pointer", fontFamily:"inherit", color:"inherit", textAlign:"left" },
  devName: { fontSize:16, fontWeight:600, color:"#f0e6d4", marginBottom:4 },
