const scaleInstruction = (text, scale) => {
  if (scale === 1) return text;
  return text
    .replace(/(\d+\.?\d*)ml/g, (_, num) => `${Math.round(parseFloat(num) * scale)}ml`)
    .replace(/(\d+\.?\d*)g/g, (_, num) => {
      const v = parseFloat(num) * scale;
      return `${v % 1 === 0 ? v : v.toFixed(1)}g`;
    });
};

const formatTime = (s) => { if (s < 0) s = 0; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec.toString().padStart(2, "0")}`; };
const formatTimeEn = (s) => { const m = Math.floor(s / 60); const sec = s % 60; return sec === 0 ? `${m} min` : `${m} min ${sec} sec`; };

// ─── MAIN APP ──────────────────────────────────────────────────────
function DarkroomApp() {
  const [screen, setScreen] = useState("home");
  const [selectedDev, setSelectedDev] = useState(null);
  const [selectedFilm, setSelectedFilm] = useState(null);
  const [selectedEI, setSelectedEI] = useState(null);
  const [selectedCombo, setSelectedCombo] = useState(null);
  const [volume, setVolume] = useState(1000);
  const [presoak, setPresoak] = useState(false);

  const navigate = (s, data) => {
    setScreen(s);
    if (data?.dev !== undefined) setSelectedDev(data.dev);
    if (data?.film !== undefined) setSelectedFilm(data.film);
    if (data?.ei !== undefined) setSelectedEI(data.ei);
    if (data?.combo !== undefined) setSelectedCombo(data.combo);
    if (data?.presoak !== undefined) setPresoak(data.presoak);
    window.scrollTo(0, 0);
  };

  return (
    <div style={S.app}>
      <style>{`
        @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.3)} 50%{box-shadow:0 0 20px 4px rgba(255,107,53,0.15)} }
        @keyframes checkPop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        @keyframes tankRock { 0%{transform:rotate(-12deg)} 100%{transform:rotate(12deg)} }
        * { box-sizing: border-box; }
      `}</style>
      <div style={S.safeArea}>
        {screen === "home" && <HomeScreen navigate={navigate} />}
        {screen === "mixing" && <MixingScreen dev={selectedDev} volume={volume} setVolume={setVolume} navigate={navigate} />}
        {screen === "filmSelect" && <FilmSelectScreen dev={selectedDev} navigate={navigate} />}
        {screen === "eiSelect" && <EISelectScreen dev={selectedDev} film={selectedFilm} navigate={navigate} />}
        {screen === "dilutionSelect" && <DilutionSelectScreen dev={selectedDev} film={selectedFilm} ei={selectedEI} navigate={navigate} />}
        {screen === "timer" && <TimerScreen combo={selectedCombo} film={selectedFilm} dev={selectedDev} presoak={presoak} setPresoak={setPresoak} navigate={navigate} />}
        {screen === "process" && <ProcessScreen combo={selectedCombo} film={selectedFilm} dev={selectedDev} presoak={presoak} navigate={navigate} />}
      </div>
    </div>
  );
}

// ─── MIXING (CHECKLIST) ────────────────────────────────────────────
function MixingScreen({ dev, volume, setVolume, navigate }) {
  const [completed, setCompleted] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const d = DEVELOPERS[dev];
  const scale = volume / 1000;
  const total = d.mixingSteps.length;
  const doneCount = Object.keys(completed).length;

  const toggleStep = (idx) => {
    setCompleted(prev => {
      const next = { ...prev };
      if (next[idx]) { delete next[idx]; }
      else {
        next[idx] = true;
        for (let i = idx + 1; i < total; i++) { if (!next[i]) { setActiveStep(i); break; } }
      }
      return next;
    });
  };

  return (
    <div style={S.screen}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button style={S.backBtn} onClick={() => navigate("home")}>← Back</button>
        <button style={S.startBtnSmall} onClick={() => navigate("filmSelect", { dev })}>Start Timer →</button>
      </div>
      <h2 style={S.screenTitle}>{d.nameJa}</h2>
      <p style={S.screenSub}>Mixing Guide</p>

      <div style={S.volumeRow}>
        <span style={S.volumeLabel}>Volume:</span>
        {[500, 1000, 2000].map(v => (
          <button key={v} style={{ ...S.volumeBtn, ...(volume === v ? S.volumeBtnActive : {}) }} onClick={() => setVolume(v)}>{v}ml</button>
        ))}
      </div>

      <div style={S.sectionLabel}>Chemicals Required</div>
      <div style={S.chemList}>
        {d.chemicals.map((c, i) => (
          <div key={i} style={S.chemRow}>
            <div>
              <div style={S.chemName}>{c.name}</div>
              <div style={S.chemRole}>{c.role}</div>
            </div>
            <div style={S.chemAmount}>
              {c.unit === "ml" ? Math.round(c.amount * scale) : (c.amount * scale).toFixed(1)}
              <span style={S.chemUnit}>{c.unit}</span>
            </div>
          </div>
        ))}
      </div>

      <div style={S.sectionLabel}>Mixing Steps — {doneCount} / {total}</div>
      <div style={S.progressTrack}>
        <div style={{ ...S.progressFill, width: `${(doneCount / total) * 100}%` }} />
      </div>

      {d.mixingSteps.map((s, i) => {
        const isDone = !!completed[i];
        const isCurrent = i === activeStep && !isDone;
        return (
          <button key={i} onClick={() => toggleStep(i)} style={{
            ...S.checkStep,
            ...(isDone ? S.checkStepDone : {}),
            ...(isCurrent ? S.checkStepCurrent : {}),
          }}>
            <div style={{ ...S.checkbox, ...(isDone ? S.checkboxDone : {}) }}>
              {isDone && <span style={{ color: "#5a9a6a", fontSize: 16, fontWeight: 700, animation: "checkPop 0.3s ease forwards" }}>✓</span>}
            </div>
            <div style={{ flex: 1 }}>
              <div style={S.checkStepNum}>STEP {i + 1}</div>
              <div style={{ ...S.checkInstruction, ...(isDone ? S.checkInstructionDone : {}) }}>{scaleInstruction(s.instruction, scale)}</div>
              {s.tip && !isDone && <div style={S.checkTip}>💡 {s.tip}</div>}
            </div>
          </button>
        );
      })}

      {doneCount === total && (
        <div style={S.mixDoneMsg}>✓ Mixing Complete!</div>
      )}
    </div>
  );
}

// ─── EI SELECT ─────────────────────────────────────────────────────
function EISelectScreen({ dev, film, navigate }) {
  const f = FILMS[film];
  const combos = f.developers[dev];
  const eis = [...new Set(combos.map(c => c.ei))].sort((a, b) => a - b);
  const boxEI = eis[0];

  return (
    <div style={S.screen}>
      <button style={S.backBtn} onClick={() => navigate("filmSelect", { dev })}>← Back</button>
      <h2 style={S.screenTitle}>Select Film Speed (EI)</h2>
      <p style={S.screenSub}>{f.name}</p>
      {eis.map((ei, i) => {
        const isBox = ei === boxEI;
        const pushStops = Math.round(Math.log2(ei / boxEI));
        return (
          <button key={ei} style={{ ...S.eiCard, ...(isBox ? S.eiCardDefault : {}) }}
            onClick={() => navigate("dilutionSelect", { ei })}>
            <div style={{ flex: 1 }}>
              <div style={S.eiValue}>EI {ei}</div>
              <div style={S.eiLabel}>
                {isBox ? "Box speed (standard)" : `Push +${pushStops} stop${pushStops > 1 ? "s" : ""}`}
              </div>
            </div>
            <div style={S.devArrow}>→</div>
          </button>
        );
      })}
    </div>
  );
}

// ─── BUILD SCHEDULE HELPER ─────────────────────────────────────────
function buildAgitationSchedule(duration, agitationKey) {
  const pat = AGITATION_PATTERNS[agitationKey];
  if (!pat || !duration) return [];
  const schedule = [];

  if (agitationKey === "continuous") {
    schedule.push({ start: 0, end: duration, type: "agitate", label: "Continuous" });
    return schedule;
  }
  if (agitationKey === "gentle5s") {
    schedule.push({ start: 0, end: Math.min(5, duration), type: "agitate", label: "Gentle agitation" });
    if (duration > 5) schedule.push({ start: 5, end: duration, type: "rest", label: "Rest" });
    return schedule;
  }

  // Initial continuous
  schedule.push({ start: 0, end: Math.min(pat.initial, duration), type: "agitate", label: "Continuous" });
  let t = pat.initial;
  let cycleNum = 1;
  while (t < duration) {
    const restEnd = Math.min(t + pat.interval - pat.duration, duration);
    if (t < duration) {
      schedule.push({ start: t, end: restEnd, type: "rest", label: "Rest" });
    }
    if (restEnd < duration) {
      const agEnd = Math.min(restEnd + pat.duration, duration);
      schedule.push({ start: restEnd, end: agEnd, type: "agitate", label: `Agitate #${cycleNum}` });
      cycleNum++;
      t = restEnd + pat.duration + (pat.interval - pat.duration);
      // Actually let's simplify - t advances by interval
    } else break;
    // Recalculate: from initial, every `interval` seconds we agitate for `duration` seconds
  }
  return schedule;
}

// More accurate schedule builder
function buildSchedule(totalDuration, agitationKey) {
  const pat = AGITATION_PATTERNS[agitationKey];
  if (!pat || !totalDuration) return [];
  const items = [];

  if (agitationKey === "continuous") {
    items.push({ start: 0, end: totalDuration, type: "agitate" });
    return items;
  }
  if (agitationKey === "gentle5s") {
    items.push({ start: 0, end: Math.min(5, totalDuration), type: "agitate" });
    if (totalDuration > 5) items.push({ start: 5, end: totalDuration, type: "rest" });
    return items;
  }

  // Initial agitation
  const initEnd = Math.min(pat.initial, totalDuration);
  items.push({ start: 0, end: initEnd, type: "agitate" });

  let t = pat.initial;
  while (t < totalDuration) {
    // Rest period
    const restEnd = Math.min(t + (pat.interval - pat.duration), totalDuration);
    if (t < restEnd) {
      items.push({ start: t, end: restEnd, type: "rest" });
    }
    // Agitation period
    if (restEnd < totalDuration) {
      const agEnd = Math.min(restEnd + pat.duration, totalDuration);
      items.push({ start: restEnd, end: agEnd, type: "agitate" });
    }
    t += pat.interval;
  }
  return items;
}

// ─── FULL PROCESS SCHEDULE (all steps) ─────────────────────────────
function buildFullSchedule(steps) {
  const schedule = [];
  let offset = 0;
  for (const step of steps) {
    const agItems = step.agitation ? buildSchedule(step.duration, step.agitation) : [{ start: 0, end: step.duration, type: "agitate" }];
    schedule.push({
      stepName: step.name,
      stepNameShort: step.nameShort,
      duration: step.duration,
      offset,
      agitation: agItems,
    });
    offset += step.duration;
  }
  return schedule;
}

// ─── AGITATION TIMELINE COMPONENT ──────────────────────────────────
function AgitationTimeline({ duration, agitationKey, elapsedInStep }) {
  const pat = AGITATION_PATTERNS[agitationKey];
  if (!pat || !duration) return null;

  // Build segments: [{start, end, type: "agitate"|"rest"}]
  const segments = [];
  if (agitationKey === "continuous") {
    segments.push({ start: 0, end: duration, type: "agitate" });
  } else if (agitationKey === "gentle5s") {
    segments.push({ start: 0, end: Math.min(5, duration), type: "agitate" });
    if (duration > 5) segments.push({ start: 5, end: duration, type: "rest" });
  } else {
    // Initial continuous
    segments.push({ start: 0, end: Math.min(pat.initial, duration), type: "agitate" });
    let t = pat.initial;
    while (t < duration) {
      const agEnd = Math.min(t + pat.duration, duration);
      segments.push({ start: t, end: agEnd, type: "agitate" });
      if (agEnd < duration) {
        const restEnd = Math.min(t + pat.interval, duration);
        segments.push({ start: agEnd, end: restEnd, type: "rest" });
        t += pat.interval;
      } else break;
    }
  }

  const pct = (v) => `${(v / duration) * 100}%`;
  const curPct = Math.min((elapsedInStep / duration) * 100, 100);

  return (
    <div style={{ margin: "0 0 6px", padding: "0 2px" }}>
      {/* Time labels */}
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#6a5a46", marginBottom: 4, fontVariantNumeric: "tabular-nums" }}>
        <span>0:00</span>
        <span>{formatTime(Math.floor(duration / 2))}</span>
        <span>{formatTime(duration)}</span>
      </div>
      {/* Bar */}
      <div style={{ position: "relative", height: 28, background: "rgba(255,255,255,0.04)", borderRadius: 6, overflow: "hidden" }}>
        {segments.map((seg, i) => (
          <div key={i} style={{
            position: "absolute", top: 0, bottom: 0,
            left: pct(seg.start), width: pct(seg.end - seg.start),
            background: seg.type === "agitate" ? "rgba(255,107,53,0.35)" : "rgba(255,255,255,0.03)",
            borderRight: "1px solid rgba(0,0,0,0.3)",
          }} />
        ))}
        {/* Current position marker */}
        <div style={{
          position: "absolute", top: 0, bottom: 0, width: 3,
          left: `calc(${curPct}% - 1.5px)`,
          background: "#f0e6d4", borderRadius: 2,
          boxShadow: "0 0 6px rgba(240,230,212,0.5)",
          transition: "left 1s linear",
        }} />
      </div>
      {/* Legend */}
      <div style={{ display: "flex", gap: 16, marginTop: 6, fontSize: 10, color: "#8a7a66" }}>
        <span><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 2, background: "rgba(255,107,53,0.5)", marginRight: 4, verticalAlign: "middle" }}/>Agitate</span>
        <span><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 2, background: "rgba(255,255,255,0.08)", marginRight: 4, verticalAlign: "middle" }}/>Rest</span>
      </div>
    </div>
  );
}

// ─── AUDIO ENGINE (iOS Safari compatible) ───────────────────────────
// AudioContext for reliable beep sounds (works even when speech fails)
let audioCtx = null;
let audioUnlocked = false;

// Voices cache: load eagerly and keep updated
let cachedVoices = [];
if (typeof window !== "undefined" && window.speechSynthesis) {
  cachedVoices = window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => {
    cachedVoices = window.speechSynthesis.getVoices();
  };
}

const initAudio = () => {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { /* not available */ }
};

const unlockAudio = () => {
  initAudio();
  if (!audioCtx || audioUnlocked) return;
  // iOS requires resume() within a user gesture
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  // Play a silent buffer to fully unlock
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  audioUnlocked = true;
  // Unlock sharedAudio for iOS
  try {
    sharedAudio.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
    sharedAudio.play().catch(() => {});
  } catch(e) {}
};

// Beep sound: freq in Hz, duration in ms
const beep = (freq = 880, duration = 150, volume = 0.3) => {
  if (!audioCtx) initAudio();
  if (!audioCtx) return;
  try {
    if (audioCtx.state === "suspended") audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration / 1000);
  } catch (e) {}
};

// Double beep for agitation start
const beepAgitate = () => {
  beep(880, 150, 0.4);
  setTimeout(() => beep(1100, 150, 0.4), 200);
};

// Single low beep for rest
const beepRest = () => beep(440, 200, 0.2);

// Triple beep for step complete
const beepComplete = () => {
  beep(660, 150, 0.4);
  setTimeout(() => beep(880, 150, 0.4), 200);
  setTimeout(() => beep(1100, 200, 0.4), 400);
};

// Countdown tick
const beepTick = () => beep(660, 80, 0.15);

// Pre-recorded audio map
const AUDIO_MAP = {
  "Starting development. Please agitate.": "start_develop",
  "Please agitate.": "agitate",
  "Please rest.": "rest",
  "One minute left. Prepare stop bath.": "one_minute",
  "Last agitation. Prepare stop bath.": "last_agitate",
  "Please drain.": "drain",
  "Pour in stop bath.": "stop_bath",
  "Discard and prepare fixer.": "discard_fix",
  "Process complete.": "complete",
  "Agitate in 5 seconds.": "pre_agitate",
  "Starting fixer.": "fix_start",
  "Starting wash.": "wash_start",
  "Starting wetting agent.": "wetting_start",
  "Starting pre-soak. Please agitate.": "presoak_start",
  "10 seconds left. Prepare stop bath.": "final_ten",
  "Pour in stop bath. Agitate for one minute.": "stop_bath",
  "Voice on.": "voice_on",
  "1":"n1","2":"n2","3":"n3","4":"n4","5":"n5",
  "6":"n6","7":"n7","8":"n8","9":"n9","10":"n10",
};

const sharedAudio = new Audio();
const speak = (text) => {
  const file = AUDIO_MAP[text];
  if (!file) return;
  try {
    sharedAudio.onended = null;
    sharedAudio.pause();
    sharedAudio.currentTime = 0;
    sharedAudio.src = `audio/${file}.wav`;
    sharedAudio.play().catch(() => {});
  } catch (e) {}
};

let wakeLock = null;
const requestWakeLock = async () => {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", () => { wakeLock = null; });
    }
  } catch(e){}
};
const releaseWakeLock = () => {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
};

// Combined: beep (always) + speech (if enabled and available)
const announce = (text, soundType = "agitate") => {
  if (soundType === "agitate") beepAgitate();
  else if (soundType === "rest") beepRest();
  else if (soundType === "complete") beepComplete();
  else if (soundType === "tick") beepTick();
  speak(text);
};

// ─── PROCESS TIMER ─────────────────────────────────────────────────
function ProcessScreen({ combo, film, dev, presoak, navigate }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [totalElapsed, setTotalElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [alert, setAlert] = useState("");
  const [done, setDone] = useState(false);
  const [voiceOn, setVoiceOn] = useState(() => localStorage.getItem("voiceOn") !== "false");
  const [countdown, setCountdown] = useState(null); // null or number 5,4,3,2,1
  const [devStartTime, setDevStartTime] = useState(() => localStorage.getItem("devStartTime") || null);
  const ref = useRef(null);
  const lastSpokenRef = useRef(""); // prevent repeating same announcement
  const voiceOnRef = useRef(voiceOn);
  const wasAgitatingRef = useRef(false); // track previous agitation state (avoid stale closure)
  useEffect(() => { voiceOnRef.current = voiceOn; }, [voiceOn]);

  const steps = PROCESS_STEPS
    .filter(s => !s.optional || (s.id === "presoak" && presoak))
    .map(s => s.id === "developer" ? { ...s, duration: combo.time, agitation: combo.agitation } : s);
  const totalTime = steps.reduce((a, s) => a + s.duration, 0);
  const elapsedBefore = steps.slice(0, stepIdx).reduce((a, s) => a + s.duration, 0);
  const cur = steps[stepIdx];
  const pat = cur ? AGITATION_PATTERNS[cur.agitation] : null;
  const elapsedInStep = cur ? cur.duration - timeLeft : 0;
  const globalElapsed = elapsedBefore + elapsedInStep;
  const globalRemaining = totalTime - globalElapsed;

  const goStep = useCallback((i) => {
    if (i >= steps.length) { setDone(true); setRunning(false); localStorage.removeItem("devStartTime"); return; }
    setStepIdx(i); setTimeLeft(steps[i].duration); setAlert(""); setCountdown(null);
    lastSpokenRef.current = "";
    wasAgitatingRef.current = false;
  }, [steps]);

  useEffect(() => { goStep(0); }, []);

  // Auto-advance: developer → stop bath (10 sec delay with announcement)
  useEffect(() => {
    if (!running && timeLeft === 0 && cur?.id === "developer") {
      const nextIdx = stepIdx + 1;
      if (nextIdx < steps.length && steps[nextIdx]?.id === "stop") {
        const t1 = setTimeout(() => {
          if (voiceOnRef.current) speak("Pour in stop bath. Agitate for one minute.");
        }, 5000);
        const t2 = setTimeout(() => {
          goStep(nextIdx);
          setRunning(true);
        }, 10000);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }
    }
  }, [running, timeLeft, stepIdx]);

  // Wake Lock: prevent screen sleep while timer is running
  useEffect(() => {
    if (running) requestWakeLock();
    else releaseWakeLock();
    return () => releaseWakeLock();
  }, [running]);

  // Init audio + load voices
  useEffect(() => {
    initAudio();
    try {
      // cachedVoices is managed at module level (do not overwrite)
    } catch(e){}
  }, []);

  useEffect(() => {
    if (running && timeLeft > 0) {
      ref.current = setInterval(() => {
        setTimeLeft(p => {
          if (p <= 1) {
            setRunning(false);
            setAlert("⏰ Step complete! Proceed to next step.");
            setCountdown(null);
            beepComplete();
            try { navigator.vibrate?.([200,100,200,100,200]); } catch(e){}
            if (voiceOnRef.current) {
              if (cur?.id === "developer") speak("Pour in stop bath.");
              else if (cur?.id === "stop") speak("Discard and prepare fixer.");
              else speak("Process complete.");
            }
            return 0;
          }
          return p - 1;
        });
        setTotalElapsed(p => p + 1);
      }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [running, timeLeft]);

  // ── Agitation state + voice + countdown logic ──
  useEffect(() => {
    if (!running || !cur || !pat) return;
    const e = cur.duration - timeLeft;

    let newAlert = "";
    let newCountdown = null;

    // Determine agitation state
    if (cur.agitation === "continuous") {
      newAlert = "🔄 Agitating continuously";
    } else if (cur.agitation === "gentle5s") {
      newAlert = e < 5 ? "🔄 Gentle agitation" : "⏸ Rest";
    } else {
      // Complex pattern with initial + interval cycles
      if (e < pat.initial) {
        newAlert = "🔄 Agitate now";
      } else {
        const sinceInitial = e - pat.initial;
        const inCycle = sinceInitial % pat.interval;
        if (inCycle < pat.duration) {
          newAlert = "🔄 Agitate now";
        } else {
          newAlert = "⏸ Rest";
          // Check if countdown to next agitation
          const timeToNext = pat.interval - inCycle;
          if (timeToNext <= 5 && timeToNext > 0) {
            newCountdown = timeToNext;
          }
        }
      }
    }

    // Sound + voice logic: on state transitions
    const isNowAgitating = newAlert.includes("Agitat") || newAlert.includes("agitat");
    const wasAgitating = wasAgitatingRef.current;
    wasAgitatingRef.current = isNowAgitating;
    const isDeveloper = cur.id === "developer";
    const inFinalCountdown = !cur.manual && timeLeft <= 15 && timeLeft > 0;
    let soundType = null;
    let speechText = "";

    // Suppress agitation pre-countdown in final 15 sec
    if (inFinalCountdown) newCountdown = null;

    // Agitate/rest transition sounds (suppressed during final 10-second countdown)
    if (!inFinalCountdown) {
      if (isNowAgitating && !wasAgitating) {
        soundType = "agitate";
        // timeLeft === cur.duration means step just started → skip to avoid overlap with step-transition useEffect sound
        if (timeLeft < cur.duration) {
          speechText = "Please agitate.";
        }
        try { navigator.vibrate?.(100); } catch(e){}
      } else if (!isNowAgitating && wasAgitating && !newAlert.includes("complete") && !newAlert.includes("Complete")) {
        soundType = "rest";
        speechText = "Please rest.";
      }
    }

    // Agitation pre-countdown (outside of final 65 seconds)
    if (newCountdown !== null && newCountdown !== countdown) {
      if (newCountdown === 5) { soundType = "tick"; speechText = "Agitate in 5 seconds."; }
      else if (newCountdown <= 3) { soundType = "tick"; speechText = `${newCountdown}`; }
    }

    // Final 15-second countdown: T-10 announce → numbers from T-5
    if (inFinalCountdown) {
      soundType = "tick";
      if (isDeveloper) {
        if (timeLeft === 10) speechText = "10 seconds left. Prepare stop bath.";
        else if (timeLeft === 5) speechText = "Please drain.";
        else if (timeLeft < 5) speechText = `${timeLeft}`;
      } else {
        if (timeLeft <= 5) speechText = `${timeLeft}`;
      }
    }

    // Step completion
    if ((newAlert.includes("complete") || newAlert.includes("Complete")) && lastSpokenRef.current !== "complete") {
      soundType = "complete";
      speechText = isDeveloper ? "Pour in stop bath." : "Process complete.";
      lastSpokenRef.current = "complete";
    }

    setAlert(newAlert);
    setCountdown(newCountdown);

    // Beeps always play on transitions; speech only when voiceOn and text is set
    if (soundType) {
      if (soundType === "agitate") beepAgitate();
      else if (soundType === "rest") beepRest();
      else if (soundType === "complete") beepComplete();
      else if (soundType === "tick") beepTick();
      if (voiceOn && speechText && speechText !== lastSpokenRef.current) {
        speak(speechText);
        if (!speechText.match(/^[0-9]$/)) lastSpokenRef.current = speechText;
      }
    }
  }, [timeLeft, running, cur, pat, voiceOn]);

  // Voice + beep for step transitions
  useEffect(() => {
    if (running && cur) {
      beep(660, 200, 0.3);
      if (voiceOn) {
        const msgMap = {
          presoak: "Starting pre-soak. Please agitate.",
          developer: "Starting development. Please agitate.",
          stop: "Pour in stop bath.",
          fix: "Starting fixer.",
          wash1: "Starting wash.", wash2: "Starting wash.", wash3: "Starting wash.",
          wetting: "Starting wetting agent.",
        };
        const agitateAfter = ["stop", "fix", "wash1", "wash2", "wash3", "wetting"];
        if (msgMap[cur.id]) {
          speak(msgMap[cur.id]);
          if (agitateAfter.includes(cur.id)) {
            sharedAudio.onended = () => { sharedAudio.onended = null; if (voiceOnRef.current) speak("Please agitate."); };
          }
        }
      }
    }
  }, [stepIdx, running]);

  if (done) return (
    <div style={S.screen}>
      <div style={{ textAlign: "center", paddingTop: 80 }}>
        <div style={{ fontSize: 64, color: "#5a9a6a", marginBottom: 16 }}>✓</div>
        <h2 style={{ fontSize: 28, fontWeight: 700, color: "#f0e6d4", margin: "0 0 8px" }}>Processing Complete!</h2>
        <p style={{ fontSize: 14, color: "#8a7a66", marginBottom: 8 }}>Hang the film to dry</p>
        <p style={{ fontSize: 14, color: "#8a7a66", marginBottom: 24 }}>Total processing time: {formatTimeEn(totalElapsed)}</p>
        <button style={S.primaryBtn} onClick={() => navigate("home")}>Back to Home</button>
      </div>
    </div>
  );

  const agitating = alert.includes("Agitat") || alert.includes("agitat");
  const stepProgress = cur ? (elapsedInStep / cur.duration) * 100 : 0;

  return (
    <div style={{ ...S.screen, padding: "0 16px 40px", ...(agitating && running ? S.screenAgitate : {}) }}>
      {/* Header row: back + voice toggle */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start" }}>
          <button style={S.backBtn} onClick={() => { setRunning(false); try{window.speechSynthesis?.cancel();}catch(e){} navigate("timer", { combo, film, dev }); }}>← Stop</button>
          {devStartTime && <span style={{ fontSize: 10, color: "#5a7a5a", marginTop: 2 }}>Started: {devStartTime}</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}
          onClick={() => { unlockAudio(); const next = !voiceOn; if(next) { speak("Voice on."); } else { sharedAudio.pause(); sharedAudio.currentTime = 0; } setVoiceOn(next); localStorage.setItem("voiceOn", next); }}
        >
          <span style={{ fontSize: 13, color: voiceOn ? "#c8a87c" : "#8a7a66" }}>{voiceOn ? "🔊" : "🔇"} Voice <span style={{ fontWeight: 700 }}>{voiceOn ? "ON" : "OFF"}</span></span>
          <div style={{
            width: 48, height: 28, borderRadius: 14, cursor: "pointer",
            background: voiceOn ? "#c8a87c" : "rgba(255,255,255,0.1)",
            position: "relative", transition: "background 0.3s", flexShrink: 0,
          }}>
            <div style={{
              width: 22, height: 22, borderRadius: 11, background: "#f0e6d4",
              position: "absolute", top: 3, left: voiceOn ? 23 : 3,
              transition: "left 0.3s",
            }} />
          </div>
        </div>
      </div>

      {/* ── GLOBAL OVERVIEW ── */}
      <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "12px 14px", border: "1px solid rgba(200,168,124,0.1)", marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div style={{ fontSize: 10, color: "#6a5a46", letterSpacing: 1 }}>Elapsed</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#c8a87c", fontVariantNumeric: "tabular-nums" }}>{formatTime(globalElapsed)}</div>
          </div>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div style={{ fontSize: 10, color: "#6a5a46", letterSpacing: 1 }}>Total</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#8a7a66", fontVariantNumeric: "tabular-nums" }}>{formatTime(totalTime)}</div>
          </div>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div style={{ fontSize: 10, color: "#6a5a46", letterSpacing: 1 }}>Remaining</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#e0d4c2", fontVariantNumeric: "tabular-nums" }}>{formatTime(globalRemaining)}</div>
          </div>
        </div>
        <div style={{ position: "relative", height: 8, borderRadius: 4, overflow: "hidden", background: "rgba(255,255,255,0.04)" }}>
          {steps.reduce((acc, s, i) => {
            const prevTotal = acc.offset;
            acc.items.push(
              <div key={i} style={{
                position: "absolute", top: 0, bottom: 0,
                left: `${(prevTotal / totalTime) * 100}%`,
                width: `${(s.duration / totalTime) * 100}%`,
                borderRight: i < steps.length - 1 ? "1px solid rgba(0,0,0,0.5)" : "none",
                background: i < stepIdx ? "rgba(200,168,124,0.4)" :
                  i === stepIdx ? `linear-gradient(90deg, rgba(200,168,124,0.4) ${stepProgress}%, transparent ${stepProgress}%)` :
                  "transparent",
              }} />
            );
            acc.offset += s.duration;
            return acc;
          }, { items: [], offset: 0 }).items}
        </div>
        <div style={{ display: "flex", marginTop: 4 }}>
          {steps.map((s, i) => (
            <div key={i} style={{
              flex: s.duration, textAlign: "center", fontSize: 9,
              color: i === stepIdx ? "#c8a87c" : "#5a4a36",
              fontWeight: i === stepIdx ? 700 : 400,
              overflow: "hidden", whiteSpace: "nowrap",
            }}>{s.nameShort}</div>
          ))}
        </div>
      </div>

      {/* ── CURRENT STEP: COMPACT LAYOUT ── */}
      <div style={{ textAlign: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 12, color: "#8a7a66" }}>{stepIdx + 1} / {steps.length}</div>
        <div style={{ fontSize: 20, fontWeight: 700, color: "#f0e6d4" }}>{cur?.name}</div>
      </div>

      {/* Tank + Timer side by side */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
        {/* Tank animation (compact) */}
        <div style={{ width: 80, flexShrink: 0 }}>
          <svg viewBox="0 0 120 100" style={{
            width: "100%",
            animation: agitating && running ? "tankRock 0.4s ease-in-out infinite alternate" : "none",
          }}>
            <rect x="30" y="15" width="60" height="70" rx="4" fill="none"
              stroke={agitating && running ? "#ff6b35" : "#5a4a36"} strokeWidth="2.5" />
            <rect x="26" y="10" width="68" height="10" rx="3" fill="none"
              stroke={agitating && running ? "#ff6b35" : "#5a4a36"} strokeWidth="2" />
            <line x1="60" y1="5" x2="60" y2="12" stroke={agitating && running ? "#ff6b35" : "#5a4a36"} strokeWidth="2.5" strokeLinecap="round" />
            <rect x="33" y="35" width="54" height="47" rx="2"
              fill={agitating && running ? "rgba(255,107,53,0.15)" : "rgba(200,168,124,0.08)"} />
            <path d={agitating && running ? "M33 35 Q42 30 51 35 Q60 40 69 35 Q78 30 87 35" : "M33 35 L87 35"}
              fill="none" stroke={agitating && running ? "rgba(255,107,53,0.5)" : "rgba(200,168,124,0.2)"} strokeWidth="1.5" />
            {agitating && running && <>
              <path d="M15 40 L10 50 L15 60" fill="none" stroke="rgba(255,107,53,0.4)" strokeWidth="1.5" strokeLinecap="round" />
              <path d="M105 40 L110 50 L105 60" fill="none" stroke="rgba(255,107,53,0.4)" strokeWidth="1.5" strokeLinecap="round" />
            </>}
          </svg>
          <div style={{ textAlign: "center", fontSize: 10, fontWeight: 600, color: agitating && running ? "#ff6b35" : "#5a4a36" }}>
            {agitating && running ? "Agitating" : running ? "Resting" : "Standby"}
          </div>
        </div>

        {/* Timer circle (compact) */}
        <div style={{ position: "relative", width: 120, height: 120, flexShrink: 0 }}>
          <svg viewBox="0 0 200 200" style={{ width: "100%", height: "100%" }}>
            <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6" />
            <circle cx="100" cy="100" r="90" fill="none"
              stroke={agitating && running ? "#ff6b35" : "#c8a87c"} strokeWidth="6" strokeLinecap="round"
              strokeDasharray={`${2*Math.PI*90}`} strokeDashoffset={`${2*Math.PI*90*(1-stepProgress/100)}`}
              style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} transform="rotate(-90 100 100)" />
          </svg>
          <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
            fontSize: 28, fontWeight: 200, color: "#f0e6d4", fontVariantNumeric: "tabular-nums",
            fontFamily: "'SF Mono','Menlo',monospace" }}>{formatTime(timeLeft)}</div>
        </div>

        {/* Alert + countdown (compact) */}
        <div style={{ flex: 1, minWidth: 0 }}>
          {countdown !== null && running && !agitating && (
            <div style={{ fontSize: 13, color: "#d4a055", fontWeight: 600, marginBottom: 4 }}>
              ⏱ {countdown}s
            </div>
          )}
          <div style={{
            padding: "10px 12px", borderRadius: 10, fontSize: 14, fontWeight: 600, lineHeight: 1.4,
            background: agitating && running ? "rgba(255,107,53,0.12)" : "rgba(255,255,255,0.03)",
            color: agitating && running ? "#ff6b35" : "#8a7a66",
            border: `1px solid ${agitating && running ? "rgba(255,107,53,0.3)" : "rgba(200,168,124,0.08)"}`,
            animation: agitating && running ? "pulseGlow 1.5s infinite" : "none",
          }}>{alert || "Press ▶ to start"}</div>
          {pat && pat.desc && cur?.id === "developer" && (
            <div style={{ fontSize: 11, color: "#6a5a46", marginTop: 6, lineHeight: 1.5 }}>{pat.desc}</div>
          )}
        </div>
      </div>


      {/* Controls */}
      <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 12 }}>
        {!running && timeLeft > 0 && <button style={{ ...S.timerPlayBtn, padding: "12px 40px", fontSize: 16 }} onClick={() => { unlockAudio(); beep(880, 200, 0.3); if (cur?.id === "developer" && !devStartTime) { const now = new Date(); const t = `${now.getHours().toString().padStart(2,"0")}:${now.getMinutes().toString().padStart(2,"0")}`; setDevStartTime(t); localStorage.setItem("devStartTime", t); } setRunning(true); }}>▶ Start</button>}
        {running && <button style={{ ...S.timerPauseBtn, padding: "12px 40px", fontSize: 16 }} onClick={() => { sharedAudio.onended = null; sharedAudio.pause(); sharedAudio.currentTime = 0; setRunning(false); }}>⏸ Pause</button>}
        {timeLeft === 0 && stepIdx < steps.length - 1 && (
          <button style={{ ...S.timerNextBtn, padding: "12px 24px", fontSize: 14 }} onClick={() => goStep(stepIdx + 1)}>Next: {steps[stepIdx + 1]?.name} →</button>
        )}
        {timeLeft === 0 && stepIdx === steps.length - 1 && (
          <button style={{ ...S.timerNextBtn, padding: "12px 24px", fontSize: 14 }} onClick={() => setDone(true)}>Complete ✓</button>
        )}
      </div>

      {/* Agitation timeline bar */}
      {cur && cur.agitation && (
        <AgitationTimeline duration={cur.duration} agitationKey={cur.agitation} elapsedInStep={elapsedInStep} />
      )}

      {/* ── LIVE SCHEDULE LIST ── */}
      <div style={{ ...S.sectionLabel, marginTop: 12, marginBottom: 8 }}>Agitation Schedule</div>
      <div style={{
        background: "rgba(255,255,255,0.02)", borderRadius: 10, overflow: "hidden",
        border: "1px solid rgba(200,168,124,0.08)", maxHeight: 240, overflowY: "auto",
        WebkitOverflowScrolling: "touch",
      }}>
        {cur && cur.agitation && (() => {
          const sched = buildSchedule(cur.duration, cur.agitation);
          return sched.map((item, i) => {
            const dur = item.end - item.start;
            const isAg = item.type === "agitate";
            const isCurrent = elapsedInStep >= item.start && elapsedInStep < item.end;
            const isDone = elapsedInStep >= item.end;
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "8px 12px",
                borderBottom: i < sched.length - 1 ? "1px solid rgba(200,168,124,0.04)" : "none",
                background: isCurrent
                  ? (isAg ? "rgba(255,107,53,0.1)" : "rgba(200,168,124,0.06)")
                  : "transparent",
                opacity: isDone ? 0.4 : 1,
                transition: "all 0.3s",
              }}>
                {/* Marker */}
                <div style={{
                  width: 6, height: 6, borderRadius: "50%", flexShrink: 0,
                  background: isCurrent ? (isAg ? "#ff6b35" : "#c8a87c") : (isAg ? "rgba(255,107,53,0.3)" : "rgba(200,168,124,0.15)"),
                  boxShadow: isCurrent ? `0 0 6px ${isAg ? "rgba(255,107,53,0.5)" : "rgba(200,168,124,0.3)"}` : "none",
                }} />
                {/* Time */}
                <div style={{ minWidth: 75, fontSize: 12, fontVariantNumeric: "tabular-nums", color: isCurrent ? "#e0d4c2" : "#7a6a56" }}>
                  {formatTime(item.start)}–{formatTime(item.end)}
                </div>
                {/* Action */}
                <div style={{
                  flex: 1, fontSize: 13,
                  color: isCurrent ? (isAg ? "#ff6b35" : "#c8a87c") : (isAg ? "#9a6a40" : "#5a4a36"),
                  fontWeight: isCurrent ? 700 : 400,
                }}>
                  {isAg ? "Agitate" : "Rest"}
                  {isCurrent && " ◀"}
                </div>
                {/* Duration */}
                <div style={{ fontSize: 11, color: "#6a5a46", fontVariantNumeric: "tabular-nums" }}>
                  {dur >= 60 ? formatTimeEn(dur) : `${dur}s`}
                </div>
              </div>
            );
          });
        })()}

        {/* If not a developer step, show simple info */}
        {cur && !cur.agitation && (
          <div style={{ padding: "12px", fontSize: 13, color: "#8a7a66", textAlign: "center" }}>
            {cur.description}
          </div>
        )}
      </div>

      {/* ── REMAINING PROCESS STEPS ── */}
      {stepIdx < steps.length - 1 && (
        <>
          <div style={{ ...S.sectionLabel, marginTop: 12, marginBottom: 6 }}>Upcoming Steps</div>
          {steps.slice(stepIdx + 1).map((s, i) => (
            <div key={i} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "8px 12px", fontSize: 13,
              borderBottom: "1px solid rgba(200,168,124,0.04)",
            }}>
              <span style={{ color: "#7a6a56" }}>{s.name}</span>
              <span style={{ color: "#5a4a36", fontVariantNumeric: "tabular-nums" }}>{formatTimeEn(s.duration)}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );
}
